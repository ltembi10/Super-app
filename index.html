<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <!-- Mobile responsiveness -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Campus Life Super App</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Navigation -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="/">Campus App</a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link text-white" href="/events">Events</a>
          </li>
          <li class="nav-item">
            <a class="nav-link text-white" href="/api">API Data</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="container mt-4">

    <header>
      <h1>Welcome to Campus Life</h1>
      <p>Your one-stop app for campus events, food, and more!</p>
    </header>

    <!-- Interactive Button -->
    <section class="mt-3">
      <button id="welcome-btn" class="btn btn-primary">Click Me</button>
    </section>

    <!-- API Preview Section -->
    <section class="mt-5">
      <h2>Trending Media</h2>
      <div id="api-results" class="row"></div>
    </section>

  </main>

  <!-- JS -->
  <script src="script.js"></script>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
